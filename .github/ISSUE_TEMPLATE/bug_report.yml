name: Bug report
description: Report a bug in docs, schemas, examples, or tooling.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed Behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include files, commands, schema paths, or JSON pointers when possible.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain whether this affects interoperability, validation, safety, or conformance.

